<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News // itscapnmurica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c0f;
      --bg2: #0f1318;
      --panel: #13181f;
      --border: #1e2730;
      --accent: #00e5ff;
      --accent2: #7fff6e;
      --accent3: #ff6b35;
      --accent4: #c084fc;
      --accent5: #facc15;
      --text: #c8d6e5;
      --text-dim: #4a5a6a;
      --text-bright: #eaf2ff;
      --glow: rgba(0,229,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 48px 0 0;
      animation: fadeDown 0.6s ease both;
    }

    .prompt-line {
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .prompt-line span { color: var(--accent2); }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .meta {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .meta #updated { color: var(--accent); }

    .nav {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--text-bright);
      border-color: var(--accent);
      background: rgba(0,229,255,0.07);
      box-shadow: 0 0 10px rgba(0,229,255,0.1);
    }

    .nav-btn[data-cat="Computing"].active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }
    .nav-btn[data-cat="Politics"].active { border-color: var(--accent3); color: var(--accent3); background: rgba(255,107,53,0.07); }
    .nav-btn[data-cat="Space"].active { border-color: var(--accent5); color: var(--accent5); background: rgba(250,204,21,0.07); }

    .divider {
      margin: 36px 0 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label.computing { color: var(--accent); }
    .section-label.politics  { color: var(--accent3); }
    .section-label.space     { color: var(--accent5); }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, currentColor, transparent);
      opacity: 0.3;
    }

    .category-block {
      margin-bottom: 44px;
      animation: fadeUp 0.4s ease both;
    }

    .article-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .article {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px 18px;
      border-radius: 2px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    .article:hover {
      border-color: rgba(0,229,255,0.3);
      background: #161c24;
      transform: translateX(3px);
    }

    .article-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 7px;
      flex-shrink: 0;
      background: var(--text-dim);
    }

    .computing .article-dot { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }
    .politics  .article-dot { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
    .space     .article-dot { background: var(--accent5); box-shadow: 0 0 6px var(--accent5); }

    .article-title {
      font-size: 12.5px;
      color: var(--text-bright);
      line-height: 1.5;
      flex: 1;
    }

    .article-date {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      white-space: nowrap;
    }

    #loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    #loading span {
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    #error {
      display: none;
      background: var(--panel);
      border: 1px solid rgba(255,107,53,0.3);
      border-left: 3px solid var(--accent3);
      padding: 20px 24px;
      color: var(--accent3);
      font-size: 12px;
      margin-top: 32px;
    }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0 44px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="prompt-line"><span>~/</span> cat news.json</div>
    <h1>Daily Feed</h1>
    <div class="meta">last updated: <span id="updated">--</span></div>
    <div class="nav">
      <button class="nav-btn active" data-cat="all">// all</button>
      <button class="nav-btn" data-cat="Computing">// computing</button>
      <button class="nav-btn" data-cat="Politics">// politics</button>
      <button class="nav-btn" data-cat="Space">// space</button>
    </div>

  </header>

  <div class="divider">── FEED ──</div>

  <div id="loading">fetching headlines<span>_</span></div>
  <div id="error">Failed to load news.json — make sure the GitHub Action has run at least once.</div>
  <div id="feed"></div>

  <footer>
    <div>auto-updated daily via github actions</div>
    <div>itscapnmurica // <a href="index.html" style="color:var(--text-dim);text-decoration:none;">home</a></div>
  </footer>

</div>

<script>
  const CATEGORIES = ["Computing", "Politics", "Space"];
  let allArticles = [];
  let activeFilter = "all";

  function formatDate(str) {
    if (!str) return "";
    try {
      const d = new Date(str);
      if (isNaN(d)) return str.slice(0, 16);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    } catch { return ""; }
  }

  function render() {
    const feed = document.getElementById("feed");
    const filtered = activeFilter === "all"
      ? allArticles
      : allArticles.filter(a => a.category === activeFilter);

    if (filtered.length === 0) {
      feed.innerHTML = `<div style="color:var(--text-dim);font-size:12px;padding:40px 0;">no articles found.</div>`;
      return;
    }

    const byCategory = {};
    for (const cat of (activeFilter === "all" ? CATEGORIES : [activeFilter])) {
      byCategory[cat] = filtered.filter(a => a.category === cat);
    }

    feed.innerHTML = Object.entries(byCategory).map(([cat, articles]) => {
      if (!articles.length) return "";
      const cls = cat.toLowerCase();
      return `
        <div class="category-block">
          <div class="section-label ${cls}">// ${cat.toLowerCase()}</div>
          <div class="article-list">
            ${articles.map(a => `
              <a class="article" href="${a.link}" target="_blank" rel="noopener">
                <div class="article-dot ${cls}"></div>
                <div style="flex:1">
                  <div class="article-title">${a.title}</div>
                  ${a.date ? `<div class="article-date">${formatDate(a.date)}</div>` : ""}
                </div>
              </a>
            `).join("")}
          </div>
        </div>
      `;
    }).join("");
  }

  async function load() {
    try {
      const res = await fetch("news.json?t=" + Date.now());
      if (!res.ok) throw new Error("not found");
      const data = await res.json();
      allArticles = data.articles || [];
      document.getElementById("updated").textContent = data.updated || "unknown";
      document.getElementById("loading").style.display = "none";
      render();
    } catch (e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
    }
  }

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.cat;
      render();
    });
  });

  load();
</script>
</body>
</html>
