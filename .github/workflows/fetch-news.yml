name: Fetch News

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC
  workflow_dispatch:       # Lets you trigger it manually too

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch RSS feeds and write news.json
        run: |
          python3 << 'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET, datetime

          feeds = [
            {
              "category": "Computing",
              "url": "https://feeds.arstechnica.com/arstechnica/technology-lab"
            },
            {
              "category": "Computing",
              "url": "https://www.phoronix.com/rss.php"
            },
            {
              "category": "Politics",
              "url": "https://feeds.npr.org/1014/rss.xml"
            },
            {
              "category": "Politics",
              "url": "https://rss.politico.com/politics-news.xml"
            },
            {
              "category": "Space",
              "url": "https://www.space.com/feeds/all"
            },
            {
              "category": "Space",
              "url": "https://spaceflightnow.com/feed/"
            },
          ]

          articles = []

          for feed in feeds:
            try:
              req = urllib.request.Request(feed["url"], headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                tree = ET.parse(r)
              root = tree.getroot()
              ns = ""
              # Handle atom feeds
              if root.tag.startswith("{"):
                ns = root.tag.split("}")[0] + "}"
              items = root.findall(f".//{ns}item") or root.findall(f".//{ns}entry")
              for item in items[:5]:
                def t(tag):
                  el = item.find(f"{ns}{tag}")
                  if el is None:
                    el = item.find(tag)
                  return el.text.strip() if el is not None and el.text else ""
                title = t("title")
                link = t("link")
                if not link:
                  link_el = item.find(f"{ns}link")
                  if link_el is not None:
                    link = link_el.get("href", "")
                pub = t("pubDate") or t("published") or t("updated")
                if title and link:
                  articles.append({
                    "category": feed["category"],
                    "title": title,
                    "link": link,
                    "date": pub
                  })
            except Exception as e:
              print(f"Failed to fetch {feed['url']}: {e}")

          output = {
            "updated": datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"),
            "articles": articles
          }

          with open("news.json", "w") as f:
            json.dump(output, f, indent=2)

          print(f"Wrote {len(articles)} articles to news.json")
          EOF

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "chore: update news feed [$(date -u '+%Y-%m-%d')]"
          git push
